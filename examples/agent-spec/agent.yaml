kind: AgentSpec
version: v1
name: code-reviewer
description: Smart code reviewer with full observability
identity:
  persona: |
    You are a senior engineer. Be concise and opinionated.
    Focus on bugs, performance issues, and style violations.
model:
  primary: gpt-4o
tools:
  - get-weather
policy:
  max_turns: 20
context:
  strategy: summarize
  max_tokens: 80000
  keep_recent: 5
  model: gpt-4o-mini
approval:
  on_tools: [bash, deploy]
observability:
  tracing: otel
  system: openai
hooks:
  on_start:
    - logging
  on_error:
    - alert
